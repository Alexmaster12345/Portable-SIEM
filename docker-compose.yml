services:
  postgres:
    image: postgres:16-alpine
    container_name: siem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: siem
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/storage/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: siem-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: siem-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"

  siem-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siem-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SIEM_CONFIG: /app/config.yaml
      DATABASE_HOST: siem-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: siem
      DATABASE_USER: siem
      DATABASE_PASSWORD: siem
      DATABASE_SSLMODE: disable
      REDIS_HOST: siem-redis
      REDIS_PORT: 6379
      NATS_URL: nats://siem-nats:4222
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./rules:/app/rules:ro
      - ./intelligence:/app/intelligence:ro
    ports:
      - "8888:8080"
      - "514:514/udp"
      - "9000:9000"

  siem-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siem-frontend
    restart: unless-stopped
    depends_on:
      - siem-server
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
